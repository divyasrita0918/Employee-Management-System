<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3 class="logo">EMS</h3>

        <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>

        <a href="#"><i class="bi bi-people-fill"></i> Employees</a>

        <a href="add-employee.html"><i class="bi bi-person-plus-fill"></i> Add Employee</a>

        <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>

    </div>

    <!-- Main Content -->

    <div class="main">

        <nav class="navbar bg-white shadow-sm rounded">

            <div class="container-fluid">

                <h4>Employee Management System</h4>

                <div>

                    <i class="bi bi-bell me-4"></i>

                    <img src="images/OIP.webp" class="rounded-circle" width="45" height="45" alt="Logo"alt="Employee Logo">

                </div>

            </div>

        </nav>

        <!-- Cards -->

        <div class="row mt-4">

            <div class="col-md-3">

                <div class="card stats">

                    <h6>Total Employees</h6>

                    <h2>250</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats">

                    <h6>Departments</h6>

                    <h2>8</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats">

                    <h6>New Employees</h6>

                    <h2>15</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card stats">

                    <h6>Active</h6>

                    <h2>241</h2>

                </div>

            </div>

        </div>

        <!-- Employee Table -->

        <div class="card mt-4 p-4">

            <div class="d-flex justify-content-between mb-3">

                <input type="text"
                class="form-control w-25"
                placeholder="Search Employee">

                <select class="form-select w-25">

                    <option>All Departments</option>

                    <option>HR</option>

                    <option>IT</option>

                    <option>Finance</option>

                </select>

                <a href="add-employee.html"
                class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Add Employee

                </a>

            </div>

            <table class="table table-hover">

                <thead class="table-primary">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Phone</th>

                    <th>Department</th>

                    <th>Designation</th>

                    <th>Salary</th>

                    <th>Joining</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>EMP101</td>

                        <td>John Doe</td>

                        <td>john@gmail.com</td>

                        <td>9876543210</td>

                        <td>IT</td>

                        <td>Developer</td>

                        <td>$3500</td>

                        <td>12-03-2025</td>

                        <td>

                            <button class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil"></i>

                            </button>

                            <button class="btn btn-danger btn-sm">

                                <i class="bi bi-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
