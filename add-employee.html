<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee | Employee Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container py-4 py-lg-5">

        <div class="row justify-content-center">

            <div class="col-lg-10 col-xl-9">

                <div class="card shadow-lg border-0 rounded-4">

                    <!-- Header -->

                    <div
                        class="card-header bg-primary text-white rounded-top-4 d-flex flex-column flex-md-row justify-content-between align-items-center">

                        <h3 class="mb-3 mb-md-0">
                            <i class="bi bi-person-plus-fill"></i>
                            Add Employee
                        </h3>

                        <a href="dashboard.html" class="btn btn-light">
                            <i class="bi bi-arrow-left"></i>
                            Back to Dashboard
                        </a>

                    </div>

                    <!-- Form -->

                    <div class="card-body p-4 p-lg-5">

                        <form id="employeeForm">

                            <div class="row">

                                <!-- Name -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input
                                        type="text"
                                        id="name"
                                        class="form-control"
                                        placeholder="Enter employee name"
                                        required>

                                </div>

                                <!-- Employee ID -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Employee ID
                                    </label>

                                    <input
                                        type="text"
                                        id="employeeId"
                                        class="form-control"
                                        placeholder="EMP101"
                                        required>

                                </div>

                                <!-- Email -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Email Address
                                    </label>

                                    <input
                                        type="email"
                                        id="email"
                                        class="form-control"
                                        placeholder="employee@email.com"
                                        required>

                                </div>

                                <!-- Phone -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Phone Number
                                    </label>

                                    <input
                                        type="tel"
                                        id="phone"
                                        class="form-control"
                                        placeholder="9876543210"
                                        required>

                                </div>

                                <!-- Department -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Department
                                    </label>

                                    <select
                                        id="department"
                                        class="form-select"
                                        required>

                                        <option value="">
                                            Select Department
                                        </option>

                                        <option>IT</option>
                                        <option>HR</option>
                                        <option>Finance</option>
                                        <option>Marketing</option>
                                        <option>Sales</option>
                                        <option>Operations</option>

                                    </select>

                                </div>

                                <!-- Designation -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Designation
                                    </label>

                                    <input
                                        type="text"
                                        id="designation"
                                        class="form-control"
                                        placeholder="Software Developer"
                                        required>

                                </div>

                                <!-- Salary -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Salary
                                    </label>

                                    <input
                                        type="number"
                                        id="salary"
                                        class="form-control"
                                        placeholder="50000"
                                        required>

                                </div>

                                <!-- Joining Date -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Joining Date
                                    </label>

                                    <input
                                        type="date"
                                        id="joiningDate"
                                        class="form-control"
                                        required>

                                </div>

                                <!-- Employment Status -->

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Employment Status
                                    </label>

                                    <select
                                        id="employmentStatus"
                                        class="form-select"
                                        required>

                                        <option value="Active">
                                            Active
                                        </option>

                                        <option value="Inactive">
                                            Inactive
                                        </option>

                                    </select>

                                </div>

                                <!-- Address -->

                                <div class="col-12 mb-3">

                                    <label class="form-label">
                                        Address
                                    </label>

                                    <textarea
                                        id="address"
                                        rows="4"
                                        class="form-control"
                                        placeholder="Enter employee address"></textarea>

                                </div>

                            </div>

                            <!-- Buttons -->

                            <div class="row mt-4">

                                <div class="col-12">

                                    <div
                        class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
                                        <button
                                            type="submit"
                                            class="btn btn-primary">

                                            <i class="bi bi-check-circle-fill"></i>

                                            Save Employee

                                        </button>

                                        <button
                                            type="reset"
                                            class="btn btn-secondary">

                                            <i class="bi bi-arrow-counterclockwise"></i>

                                            Reset

                                        </button>

                                        <a
                                            href="dashboard.html"
                                            class="btn btn-outline-dark">

                                            <i class="bi bi-x-circle"></i>

                                            Cancel

                                        </a>

                                    </div>

                                </div>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->

    <script src="js/script.js"></script>

</body>

</html>
