<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Employee Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      <h3 class="logo">EMS</h3>
      <a class="active" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="dashboard.html"><i class="bi bi-people-fill"></i> Employees</a>
      <a href="add-employee.html"><i class="bi bi-person-plus-fill"></i> Add Employee</a>
      <a href="index.html" data-logout="true"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </aside>

    <main class="main">
      <nav class="navbar">
        <div class="container-fluid px-0">
          <h4 class="mb-0">Employee Management System</h4>
          <div class="d-flex align-items-center gap-3">
            <span class="text-muted small">Welcome, <strong id="userName">Admin</strong></span>
            <img src="images/OIP.webp" class="rounded-circle" width="45" height="45" alt="Employee Logo">
          </div>
        </div>
      </nav>

      <div class="row mt-4 g-3">
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card stats">
            <h6>Total Employees</h6>
            <h2 id="totalEmployees">0</h2>
          </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card stats">
            <h6>Departments</h6>
            <h2 id="departmentCount">0</h2>
          </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card stats">
            <h6>New Employees</h6>
            <h2 id="newEmployees">0</h2>
          </div>
        </div>
        <div class="col-12 col-md-6 col-xl-3">
          <div class="card stats">
            <h6>Active</h6>
            <h2 id="activeEmployees">0</h2>
          </div>
        </div>
      </div>

      <div class="card mt-4 p-3 p-lg-4">
        <div class="dashboard-controls">
          <input id="searchInput" type="text" class="form-control" placeholder="Search by name or ID">
          <select id="departmentFilter" class="form-select">
            <option value="">All Departments</option>
          </select>
          <select id="statusFilter" class="form-select">
            <option value="">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
          <a href="add-employee.html" class="btn btn-primary add-btn">
            <i class="bi bi-plus-circle"></i> Add Employee
          </a>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-primary">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Joining</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
